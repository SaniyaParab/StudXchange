<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell Item — StudXchange</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style/sell.css">
</head>
<body>

<div class="page-wrap">
  <a href="marketplace.html" class="back-btn">← Back to Marketplace</a>

  <div class="sell-card">
    <div class="card-header">
      <div class="card-header-icon">🛍️</div>
      <div>
        <h2>Post Your Item</h2>
        <p>Fill in the details to list your item for sale</p>
      </div>
    </div>

    <form id="sellForm">
      <div class="form-grid">

        <div class="full">
          <label>Upload Photo</label>
          <div class="upload" id="uploadZone" onclick="document.getElementById('photo').click()">
            <div class="upload-inner" id="uploadInner">
              <div class="upload-icon">📷</div>
              <div class="upload-text">Click to upload image</div>
              <div class="upload-hint">JPG, PNG up to 5MB</div>
            </div>
            <input type="file" id="photo" accept="image/*" onchange="previewImage(event)">
            <div class="preview" id="preview"></div>
          </div>
        </div>

        <div>
          <label>Title <span class="req">*</span></label>
          <input type="text" id="title" placeholder="e.g. Engineering Textbook" required>
        </div>

        <div>
          <label>Price (₹) <span class="req">*</span></label>
          <input type="number" id="price" placeholder="e.g. 350" required>
        </div>

        <div>
          <label>Category</label>
          <select id="category">
            <option>Books</option>
            <option>Laptops</option>
            <option>Notes</option>
            <option>Bikes</option>
            <option>Furniture</option>
            <option>Electronics</option>
          </select>
        </div>

        <div>
          <label>Condition</label>
          <select id="condition">
            <option>New</option>
            <option>Like New</option>
            <option>Used</option>
          </select>
        </div>

        <div class="full">
          <label>Description</label>
          <textarea id="description" placeholder="Describe your item — age, usage, any defects…"></textarea>
        </div>

        <div>
          <label>Contact Number</label>
          <input type="tel" id="contact" placeholder="+91 98765 43210">
        </div>

      </div>

      <button type="submit" class="post-btn" id="postBtn">
        <span id="btnText">🚀 Post Item</span>
        <span id="btnLoader" style="display:none">Posting…</span>
      </button>
    </form>
  </div>
</div>

<script>
let base64Image = "";

function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const preview    = document.getElementById("preview");
  const uploadInner = document.getElementById("uploadInner");
  uploadInner.style.display = "none";
  preview.innerHTML = "";
  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);
  preview.appendChild(img);
  const reader = new FileReader();
  reader.onloadend = () => { base64Image = reader.result; };
  reader.readAsDataURL(file);
}

const user = JSON.parse(localStorage.getItem("user"));
if (!user) { alert("Please login first"); window.location.href = "Login.html"; }

document.getElementById("sellForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const title       = document.getElementById("title").value.trim();
  const price       = document.getElementById("price").value;
  if (!title || !price) { alert("Please fill in title and price"); return; }

  const btn     = document.getElementById("postBtn");
  const btnText = document.getElementById("btnText");
  const btnLoad = document.getElementById("btnLoader");
  btn.disabled = true; btnText.style.display="none"; btnLoad.style.display="inline";

  const data = {
    title, price,
    category:       document.getElementById("category").value,
    condition_type: document.getElementById("condition").value,
    description:    document.getElementById("description").value.trim(),
    contact:        document.getElementById("contact").value.trim(),
    seller_name:    user.name,
    seller_email:   user.email.toLowerCase(),
    seller_id:      user.id,
    image:          base64Image
  };

  try {
    const res    = await fetch("http://localhost:5000/add-product", {
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)
    });
    const result = await res.json();
    if (result.success) {
      alert("Item posted successfully! 🚀");
      window.location.href = "marketplace.html";
    } else {
      alert("Error: " + (result.error || "Unknown error"));
      btn.disabled=false; btnText.style.display="inline"; btnLoad.style.display="none";
    }
  } catch {
    alert("Server error — make sure server is running on port 5000");
    btn.disabled=false; btnText.style.display="inline"; btnLoad.style.display="none";
  }
});
</script>
</body>
</html>
